<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strobo Ultra 2026</title>
    <style>
        :root { --bg: #121212; --accent: #00ff88; }
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background-color: var(--bg); color: white; font-family: system-ui, -apple-system;
            transition: background-color 0.05s; overflow: hidden;
        }
        .controls { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; text-align: center; z-index: 10; }
        button {
            padding: 20px 60px; font-size: 1.5rem; font-weight: bold; cursor: pointer;
            border-radius: 50px; border: none; background: var(--accent); color: black;
            box-shadow: 0 0 20px rgba(0,255,136,0.4); margin-bottom: 20px;
        }
        button.active { background: #ff4444; color: white; box-shadow: 0 0 20px rgba(255,68,68,0.4); }
        input[type=range] { width: 100%; margin: 15px 0; }
        .flash-screen { background-color: white !important; }
    </style>
</head>
<body>

    <div class="controls">
        <button id="mainBtn">INICIAR</button>
        <div>
            <label>Velocidade: <span id="hzVal">2</span> Hz</label><br>
            <input type="range" id="freqRange" min="1" max="20" value="2">
        </div>
        <small id="status">Aguardando...</small>
    </div>

    <script>
        const btn = document.getElementById('mainBtn');
        const freqRange = document.getElementById('freqRange');
        const hzVal = document.getElementById('hzVal');
        const status = document.getElementById('status');
        
        let track = null;
        let intervalId = null;
        let isOn = false;
        let wakeLock = null;

        // Atualiza valor do texto do slider
        freqRange.oninput = () => hzVal.innerText = freqRange.value;

        async function startStrobe() {
            try {
                // 1. Tenta manter a tela acesa
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');

                // 2. Tenta acesso à câmera
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                track = stream.getVideoTracks()[0];
                
                const caps = track.getCapabilities();
                const hasTorch = !!caps.torch;
                status.innerText = hasTorch ? "Modo: LED + Tela" : "Modo: Apenas Tela";

                // 3. Loop do Strobo
                const interval = 1000 / (freqRange.value * 2); 
                
                intervalId = setInterval(async () => {
                    isOn = !isOn;
                    
                    // Pisca Tela
                    if (isOn) document.body.classList.add('flash-screen');
                    else document.body.classList.remove('flash-screen');

                    // Pisca LED (se disponível)
                    if (hasTorch) {
                        try {
                            await track.applyConstraints({ advanced: [{ torch: isOn }] });
                        } catch (e) { /* Silencia erros de concorrência no iOS */ }
                    }
                }, interval);

                btn.innerText = "PARAR";
                btn.classList.add('active');

            } catch (err) {
                console.error(err);
                status.innerText = "Erro: " + err.message;
            }
        }

        function stopStrobe() {
            clearInterval(intervalId);
            intervalId = null;
            document.body.classList.remove('flash-screen');
            if (track) {
                track.applyConstraints({ advanced: [{ torch: false }] });
                track.stop();
            }
            if (wakeLock) wakeLock.release();
            btn.innerText = "INICIAR";
            btn.classList.remove('active');
            status.innerText = "Parado";
        }

        btn.onclick = () => intervalId ? stopStrobe() : startStrobe();
    </script>
</body>
</html>
