<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>RA com Vídeo - Galinha Pintadinha</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        .arjs-loader { height: 100%; width: 100%; position: absolute; top: 0; left: 0; background-color: rgba(0, 0, 0, 0.8); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">
    <button id="playButton">CLIQUE PARA INICIAR</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <video id="vid" src="video.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-marker type="pattern" url="marker.patt">
            <a-video src="#vid" width="2" height="1.15" position="0 0.5 0" rotation="-90 0 0"></a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Lógica para dar play no vídeo quando clicar no botão
        const btn = document.getElementById('playButton');
        const video = document.getElementById('vid');
        
        btn.addEventListener('click', () => {
            video.play();
            btn.style.display = 'none'; // Esconde o botão após o play
        });
    </script>
</body>
</html>
