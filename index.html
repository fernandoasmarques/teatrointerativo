<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>RA com Vídeo - Galinha Pintadinha</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        .arjs-loader { height: 100%; width: 100%; position: absolute; top: 0; left: 0; background-color: rgba(0, 0, 0, 0.8); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; }
        #playButton { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 15px 30px; background: #222; color: white; border: none; border-radius: 10px; z-index: 1000; font-size: 18px; cursor: pointer; }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">
    <button id="playButton">CLIQUE PARA INICIAR</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <video id="vid" src="video.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-marker preset="hiro">
            <a-video src="#vid" width="2" height="1.15" position="0 0.5 0" rotation="-90 0 0"></a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('playButton');
        const video = document.getElementById('vid');
        
        btn.addEventListener('click', () => {
            video.play();
            btn.style.display = 'none';
        });
    </script>
</body>
</html>
